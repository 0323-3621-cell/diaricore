<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write Entry - DiariCore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="vendor/bootstrap-icons.min.css" rel="stylesheet">
    <link href="side-bar.css" rel="stylesheet">
    <link href="dashboard.css" rel="stylesheet">
    <link href="write-entry.css" rel="stylesheet">
    <link href="theme.css" rel="stylesheet">
    <link rel="preload" as="fetch" href="/noto-emoji/book.json">
    <script src="theme.js"></script>
    <script src="lottie-web.min.js"></script>
</head>
<body class="page-write-entry has-mobile-app-topbar">
    <!-- Mobile top bar: inlined for first paint; keep in sync with side-bar.html (hidden on this page via CSS) -->
    <header class="mobile-app-topbar" role="banner" aria-label="DiariCore">
        <div class="mobile-app-topbar__inner">
            <div class="mobile-app-topbar__default">
                <a href="dashboard.html" class="mobile-app-topbar__brand">
                    <span class="mobile-app-topbar__brand-icon" aria-hidden="true">
                        <i class="bi bi-images"></i>
                    </span>
                    <span class="mobile-app-topbar__brand-name">DIARICORE</span>
                </a>
                <span class="mobile-app-topbar__divider" aria-hidden="true"></span>
                <div class="mobile-app-topbar__actions">
                    <button type="button" class="mobile-app-topbar__btn mobile-app-topbar__btn--search-toggle" aria-label="Open search" aria-expanded="false" aria-controls="mobileAppTopbarSearchInput">
                        <i class="bi bi-search"></i>
                    </button>
                    <button type="button" class="mobile-app-topbar__btn mobile-app-topbar__btn--ai" aria-label="AI Buddy (coming soon)" title="AI Buddy (coming soon)">
                        <i class="bi bi-grid"></i>
                    </button>
                    <a href="profile.html" class="mobile-app-topbar__profile" aria-label="Profile">
                        <i class="bi bi-person-fill"></i>
                    </a>
                </div>
            </div>
            <div class="mobile-app-topbar__search-expand" id="mobileAppTopbarSearchExpand" aria-hidden="true">
                <button type="button" class="mobile-app-topbar__search-close" aria-label="Close search">
                    <i class="bi bi-x-lg"></i>
                </button>
                <div class="mobile-app-topbar__search-field">
                    <i class="bi bi-search mobile-app-topbar__search-field-icon" aria-hidden="true"></i>
                    <input type="search" id="mobileAppTopbarSearchInput" class="mobile-app-topbar__search-input" placeholder="Search entries..." autocomplete="off" enterkeyhint="search" />
                    <button type="button" class="mobile-app-topbar__filter-trigger" id="mobileTopbarFilterTrigger" aria-label="Filter entries" title="Filter">
                        <i class="bi bi-funnel"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>
    <div class="dashboard-container">
        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Mobile Header Section -->
            <div class="mobile-header">
                <button class="back-btn" onclick="window.location.href='dashboard.html'">
                    <i class="bi bi-arrow-left"></i>
                </button>
                <h1 class="mobile-title">New Entry</h1>
                <button class="save-btn" id="saveEntryBtn">
                    <i class="bi bi-check"></i>
                    Save
                </button>
            </div>
            
            <!-- Desktop Header Section (hidden on mobile) -->
            <div class="header-section">
                <h1 class="main-title">Write Your Entry</h1>
                <p class="subtitle">Express your thoughts and feelings</p>
            </div>
            
            <!-- Tags Section -->
            <div class="tags-section">
                <h2 class="section-title"># TAGS</h2>
                <div class="tags-container">
                    <!-- First row (always visible) -->
                    <button class="tag-btn first-row" data-tag="School">
                        <i class="bi bi-book"></i>
                        <span>School</span>
                    </button>
                    <button class="tag-btn first-row" data-tag="Home">
                        <i class="bi bi-house"></i>
                        <span>Home</span>
                    </button>
                    <button class="tag-btn first-row" data-tag="Friends">
                        <i class="bi bi-people"></i>
                        <span>Friends</span>
                    </button>
                    <button class="tag-btn first-row" data-tag="Work">
                        <i class="bi bi-briefcase"></i>
                        <span>Work</span>
                    </button>
                    <button class="tag-btn first-row" data-tag="Family">
                        <i class="bi bi-heart"></i>
                        <span>Family</span>
                    </button>
                    <button class="tag-btn first-row" data-tag="Health">
                        <i class="bi bi-heart-pulse"></i>
                        <span>Health</span>
                    </button>
                    <button class="tag-btn first-row" data-tag="Money">
                        <i class="bi bi-currency-dollar"></i>
                        <span>Money</span>
                    </button>
                    
                    <!-- Second row (hidden by default) -->
                    <button class="tag-btn second-row" data-tag="GF Home" style="display: none;">
                        <i class="bi bi-house-heart"></i>
                        <span>GF Home</span>
                    </button>
                    <button class="tag-btn second-row" data-tag="New Tag" style="display: none;">
                        <i class="bi bi-star"></i>
                        <span>New Tag</span>
                    </button>
                    <button class="tag-btn add-tag second-row" style="display: none;">
                        <i class="bi bi-plus"></i>
                        <span>Add Tag</span>
                    </button>
                </div>
                
                <!-- More button -->
                <button class="more-btn" id="moreTagsBtn">
                    <i class="bi bi-chevron-down"></i>
                    <span>more</span>
                </button>
            </div>
            
            <!-- Journal Input Section -->
            <div class="journal-input-section">
                <h2 class="section-title">Your Thoughts</h2>
                <div class="journal-container">
                    <div class="journal-header">
                        <div class="journal-datetime-wrap">
                            <button type="button" class="journal-datetime-btn" id="journalDateTimeBtn" title="Edit date and time">
                                <span class="journal-datetime" id="journalDateTime">Sunday, April 26, 2026 | 03:53 AM</span>
                                <i class="bi bi-pencil-square" aria-hidden="true"></i>
                            </button>
                            <input type="datetime-local" id="journalDateTimeInput" class="journal-datetime-input" />
                        </div>
                        <button class="voice-input-btn" id="voiceInputBtn" aria-label="Open voice entry" title="Voice entry">
                            <i class="bi bi-mic"></i>
                        </button>
                    </div>
                    <div class="entry-split-layout" id="entrySplitLayout">
                        <div class="entry-main-pane">
                            <input id="journalTitleInput" class="journal-title-input" type="text" maxlength="180" placeholder="Give your entry a title..." />
                            <input type="file" id="imageFileInput" accept="image/jpeg,image/png,image/webp,image/gif" multiple hidden />
                            <textarea
                                id="journalText"
                                class="journal-textarea"
                                placeholder="Start writing..."
                                maxlength="5000"
                            ></textarea>
                            <div class="entry-drop-overlay" id="entryDropOverlay" hidden>
                                <div class="entry-drop-overlay__box">
                                    <i class="bi bi-cloud-arrow-up"></i>
                                    <span>Drop images here</span>
                                </div>
                            </div>
                        </div>
                        <div class="entry-gallery-pane">
                            <div class="entry-gallery" id="entryGallery"></div>
                            <div class="entry-gallery-toolbar" id="entryGalleryToolbar" hidden>
                                <button type="button" class="entry-gallery-toolbar__btn" id="addPhotosBtn">
                                    <i class="bi bi-images"></i>
                                    <span>Add Photos</span>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="journal-footer">
                        <div class="character-counter">
                            <span id="charCount">0</span> characters
                        </div>
                        <div class="photo-count-badge" id="photoCountBadge" hidden>0 photos attached</div>
                    </div>
                </div>
            </div>
            
            <!-- Action Buttons -->
            <div class="action-buttons-section">
                <button class="btn-save-entry" id="saveEntryBtn">
                    <i class="bi bi-check-circle"></i>
                    Save Entry
                </button>
                <button class="btn-cancel" id="cancelBtn">
                    <i class="bi bi-x-circle"></i>
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <div class="photo-lightbox" id="photoLightbox" hidden>
        <button type="button" class="photo-lightbox__close" id="photoLightboxClose" aria-label="Close preview">
            <i class="bi bi-x-lg"></i>
        </button>
        <button type="button" class="photo-lightbox__nav photo-lightbox__nav--prev" id="photoLightboxPrev" aria-label="Previous image">
            <i class="bi bi-chevron-left"></i>
        </button>
        <img id="photoLightboxImage" alt="Entry image preview" />
        <button type="button" class="photo-lightbox__nav photo-lightbox__nav--next" id="photoLightboxNext" aria-label="Next image">
            <i class="bi bi-chevron-right"></i>
        </button>
    </div>

    <!-- Custom Tag Modal -->
    <div class="custom-tag-modal" id="customTagModal" hidden>
        <div class="custom-tag-modal__backdrop" data-role="close-modal"></div>
        <div class="custom-tag-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="customTagModalTitle">
            <div class="custom-tag-modal__header">
                <h3 id="customTagModalTitle">Create Custom Tag</h3>
                <button type="button" class="custom-tag-modal__close" data-role="close-modal" aria-label="Close">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            <div class="custom-tag-modal__body">
                <label class="custom-tag-modal__label" for="customTagNameInput">Tag name</label>
                <input id="customTagNameInput" class="custom-tag-modal__input" type="text" maxlength="40" placeholder="e.g. Gym, Career, Reading" />

                <label class="custom-tag-modal__label" for="customTagIconSearch">Pick an icon</label>
                <input id="customTagIconSearch" class="custom-tag-modal__input" type="search" placeholder="Search icon names..." />
                <div class="custom-tag-modal__hint" id="customTagIconMeta">Loading icons...</div>
                <div class="custom-tag-icons-grid" id="customTagIconsGrid"></div>
                <div class="custom-tag-pagination" id="customTagPagination"></div>
            </div>
            <div class="custom-tag-modal__footer">
                <button type="button" class="custom-tag-btn custom-tag-btn--ghost" data-role="close-modal">Cancel</button>
                <button type="button" class="custom-tag-btn custom-tag-btn--primary" id="customTagSaveBtn" disabled>Save tag</button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="side-bar.js"></script>
    <script src="write-entry.js"></script>
</body>
</html>
