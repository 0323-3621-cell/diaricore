<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Entry - DiariCore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="side-bar.css" rel="stylesheet">
    <link href="dashboard.css" rel="stylesheet">
    <link href="write-entry.css" rel="stylesheet">
    <link href="entry-view.css" rel="stylesheet">
    <link href="theme.css" rel="stylesheet">
    <link rel="preload" as="fetch" href="/noto-emoji/book.json">
    <script src="theme.js"></script>
    <script src="lottie-web.min.js"></script>
</head>
<body class="page-entry-view has-mobile-app-topbar">
    <header class="mobile-app-topbar" role="banner" aria-label="DiariCore">
        <div class="mobile-app-topbar__inner">
            <div class="mobile-app-topbar__default">
                <a href="entries.html" class="mobile-app-topbar__brand">
                    <span class="mobile-app-topbar__brand-icon" aria-hidden="true"><i class="bi bi-images"></i></span>
                    <span class="mobile-app-topbar__brand-name">DIARICORE</span>
                </a>
                <span class="mobile-app-topbar__divider" aria-hidden="true"></span>
                <div class="mobile-app-topbar__actions">
                    <a href="profile.html" class="mobile-app-topbar__profile" aria-label="Profile"><i class="bi bi-person-fill"></i></a>
                </div>
            </div>
        </div>
    </header>

    <div class="dashboard-container entry-view-layout">
        <div class="main-content entry-view-main">
            <header class="entry-view-toolbar">
                <button type="button" class="entry-view-toolbar__back" id="entryViewBackBtn">
                    <i class="bi bi-arrow-left" aria-hidden="true"></i>
                    <span>Back</span>
                </button>
                <div class="entry-view-toolbar__trailing">
                    <div class="entry-view-toolbar__read-actions" id="entryViewReadToolbar">
                        <span class="entry-view-ai-pill" id="entryViewAiPill" aria-live="polite">
                            <i class="bi bi-stars" aria-hidden="true"></i>
                            <span>Model Analysis: <strong id="entryViewAiEmotionLabel">—</strong></span>
                        </span>
                        <button type="button" class="entry-view-toolbar__link" id="entryViewViewDetailsBtn">View details</button>
                        <button type="button" class="entry-view-toolbar__edit" id="entryViewEditBtn">
                            <i class="bi bi-pencil" aria-hidden="true"></i>
                            Edit
                        </button>
                        <button type="button" class="entry-view-toolbar__delete" id="entryViewDeleteBtn">
                            <i class="bi bi-trash3" aria-hidden="true"></i>
                            Delete
                        </button>
                    </div>
                    <button type="button" class="entry-view-toolbar__cancel" id="entryViewCancelBtn" hidden>
                        <i class="bi bi-x-lg" aria-hidden="true"></i>
                        <span>Cancel</span>
                    </button>
                </div>
            </header>

            <div class="entry-view-card" id="entryViewCard">
                <div class="entry-view-columns" id="entryViewColumns">
                    <div class="entry-view-main-column">
                        <div class="entry-view-read-pane" id="entryViewReadPane">
                            <div class="entry-view-tags-block">
                                <span class="entry-view-tags-label">Tags:</span>
                                <div class="entry-view-tags-read" id="entryViewTagsRead" aria-label="Tags"></div>
                            </div>
                            <hr class="entry-view-divider" />
                            <p class="entry-view-datetime" id="entryViewDateLineRead"></p>
                            <h1 class="entry-view-title-read" id="entryViewTitleRead"></h1>
                            <div class="entry-view-body-read" id="entryViewBodyRead"></div>
                        </div>
                        <div class="entry-view-edit-pane" id="entryViewEditPane" hidden>
                            <div class="entry-view-tags-block">
                                <span class="entry-view-tags-label">Tags:</span>
                                <div class="tags-container entry-view-tags-inner" id="entryViewTagsRow"></div>
                            </div>
                            <hr class="entry-view-divider" />
                            <p class="entry-view-datetime" id="entryViewDateLine"></p>
                            <input type="text" class="entry-view-title-input" id="entryViewTitle" maxlength="180" placeholder="Give your entry a title..." autocomplete="off" />
                            <textarea class="entry-view-body-input" id="entryViewBody" rows="8" placeholder="Start writing..." spellcheck="true"></textarea>
                        </div>
                    </div>
                    <aside class="entry-view-images-aside" id="entryViewImagesAside" hidden aria-label="Entry photos">
                        <div class="entry-view-image-strip" id="entryViewImageStrip">
                            <p class="entry-view-image-strip__badge" id="entryViewImageStripBadge" hidden></p>
                            <div class="entry-view-image-strip__scroll" id="entryViewImageStripScroll"></div>
                            <div class="entry-view-image-strip__fade" id="entryViewImageStripFade" hidden aria-hidden="true"></div>
                            <button type="button" class="entry-view-image-strip__add" id="entryViewImageStripAddBtn" hidden>
                                <i class="bi bi-plus-lg" aria-hidden="true"></i>
                                <span>Add photos</span>
                            </button>
                        </div>
                    </aside>
                </div>
            </div>

            <div class="entry-view-actions" id="entryViewActions">
                <button type="button" class="mood-analysis-btn mood-analysis-btn--solid" id="entryViewSaveAnalyzeBtn">
                    <i class="bi bi-stars" aria-hidden="true"></i>
                    Save &amp; Analyze
                </button>
            </div>
        </div>
    </div>

    <div class="entry-delete-dialog" id="entryDeleteDialog" hidden role="dialog" aria-modal="true" aria-labelledby="entryDeleteDialogTitle">
        <div class="entry-delete-dialog__backdrop" data-entry-delete-dismiss="1"></div>
        <div class="entry-delete-dialog__panel">
            <div class="entry-delete-dialog__section entry-delete-dialog__section--header">
                <div class="entry-delete-dialog__header-row">
                    <div class="entry-delete-dialog__icon-wrap" aria-hidden="true">
                        <i class="bi bi-trash3"></i>
                    </div>
                    <div class="entry-delete-dialog__header-text">
                        <h2 id="entryDeleteDialogTitle" class="entry-delete-dialog__title">Delete this entry?</h2>
                        <p class="entry-delete-dialog__desc">
                            This is permanent — your entry will be gone from your journal and cannot be recovered.
                        </p>
                    </div>
                </div>
            </div>
            <div class="entry-delete-dialog__divider" aria-hidden="true"></div>
            <div class="entry-delete-dialog__section entry-delete-dialog__section--preview">
                <div class="entry-delete-dialog__preview">
                    <div class="entry-delete-dialog__preview-accent" aria-hidden="true"></div>
                    <div class="entry-delete-dialog__preview-inner">
                        <p class="entry-delete-dialog__preview-title" id="entryDeletePreviewTitle"></p>
                        <p class="entry-delete-dialog__preview-snippet" id="entryDeletePreviewSnippet"></p>
                        <div class="entry-delete-dialog__preview-meta">
                            <span class="entry-delete-dialog__preview-date">
                                <i class="bi bi-calendar3" aria-hidden="true"></i>
                                <span id="entryDeletePreviewDate"></span>
                            </span>
                            <span class="entry-delete-dialog__preview-mood">
                                <i class="bi bi-heart-fill" aria-hidden="true"></i>
                                <span id="entryDeletePreviewMoodLabel"></span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="entry-delete-dialog__divider" aria-hidden="true"></div>
            <div class="entry-delete-dialog__section entry-delete-dialog__section--actions">
                <div class="entry-delete-dialog__actions">
                    <button type="button" class="entry-delete-dialog__btn entry-delete-dialog__btn--secondary" id="entryDeleteCancelBtn">Keep it</button>
                    <button type="button" class="entry-delete-dialog__btn entry-delete-dialog__btn--danger" id="entryDeleteConfirmBtn">
                        <i class="bi bi-trash3" aria-hidden="true"></i>
                        Yes, delete entry
                    </button>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="entryViewImageFileInput" accept="image/jpeg,image/png,image/webp,image/gif" multiple hidden />

    <div class="photo-lightbox" id="photoLightbox" hidden>
        <button type="button" class="photo-lightbox__close" id="photoLightboxClose" aria-label="Close preview">
            <i class="bi bi-x-lg"></i>
        </button>
        <button type="button" class="photo-lightbox__nav photo-lightbox__nav--prev" id="photoLightboxPrev" aria-label="Previous image">
            <i class="bi bi-chevron-left"></i>
        </button>
        <img id="photoLightboxImage" alt="Entry image preview" />
        <button type="button" class="photo-lightbox__nav photo-lightbox__nav--next" id="photoLightboxNext" aria-label="Next image">
            <i class="bi bi-chevron-right"></i>
        </button>
    </div>

    <div class="entry-view-dialog" id="entryUnsavedDialog" hidden role="dialog" aria-modal="true" aria-labelledby="entryUnsavedTitle">
        <div class="entry-view-dialog__backdrop" data-close="1"></div>
        <div class="entry-view-dialog__box">
            <h2 id="entryUnsavedTitle" class="entry-view-dialog__title">Unsaved changes</h2>
            <p class="entry-view-dialog__text">You have unsaved changes. Discard them?</p>
            <div class="entry-view-dialog__actions">
                <button type="button" class="mood-analysis-btn mood-analysis-btn--outline" id="entryUnsavedStayBtn">Cancel</button>
                <button type="button" class="mood-analysis-btn mood-analysis-btn--solid" id="entryUnsavedDiscardBtn">Confirm</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="side-bar.js"></script>
    <script src="mood-analysis-ui.js"></script>
    <script src="entry-view.js"></script>
</body>
</html>
