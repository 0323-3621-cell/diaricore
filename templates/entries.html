<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entries - DiariCore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="side-bar.css" rel="stylesheet">
    <link href="entries.css" rel="stylesheet">
    <link href="theme.css" rel="stylesheet">
    <script src="theme.js"></script>
</head>
<body class="page-entries has-mobile-app-topbar">
    <!-- Mobile top bar: inlined for first paint; keep in sync with side-bar.html -->
    <header class="mobile-app-topbar" role="banner" aria-label="DiariCore">
        <div class="mobile-app-topbar__inner">
            <div class="mobile-app-topbar__default">
                <a href="dashboard.html" class="mobile-app-topbar__brand">
                    <span class="mobile-app-topbar__brand-icon" aria-hidden="true">
                        <i class="bi bi-images"></i>
                    </span>
                    <span class="mobile-app-topbar__brand-name">DIARICORE</span>
                </a>
                <span class="mobile-app-topbar__divider" aria-hidden="true"></span>
                <div class="mobile-app-topbar__actions">
                    <button type="button" class="mobile-app-topbar__btn mobile-app-topbar__btn--search-toggle" aria-label="Open search" aria-expanded="false" aria-controls="mobileAppTopbarSearchInput">
                        <i class="bi bi-search"></i>
                    </button>
                    <button type="button" class="mobile-app-topbar__btn mobile-app-topbar__btn--ai" aria-label="AI Buddy (coming soon)" title="AI Buddy (coming soon)">
                        <i class="bi bi-grid"></i>
                    </button>
                    <a href="profile.html" class="mobile-app-topbar__profile" aria-label="Profile">
                        <i class="bi bi-person-fill"></i>
                    </a>
                </div>
            </div>
            <div class="mobile-app-topbar__search-expand" id="mobileAppTopbarSearchExpand" aria-hidden="true">
                <button type="button" class="mobile-app-topbar__search-close" aria-label="Close search">
                    <i class="bi bi-x-lg"></i>
                </button>
                <div class="mobile-app-topbar__search-field">
                    <i class="bi bi-search mobile-app-topbar__search-field-icon" aria-hidden="true"></i>
                    <input type="search" id="mobileAppTopbarSearchInput" class="mobile-app-topbar__search-input" placeholder="Search entries..." autocomplete="off" enterkeyhint="search" />
                    <button type="button" class="mobile-app-topbar__filter-trigger" id="mobileTopbarFilterTrigger" aria-label="Filter entries" title="Filter">
                        <i class="bi bi-funnel"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>
    <div class="entries-container">
        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Main Content -->
            <main class="entries-content">
                <!-- Header Section -->
                <div class="header-section">
                    <h1 class="main-title">Your Journal Entries</h1>
                    <p class="subtitle">Reflect on your emotional journey</p>
                </div>

                <!-- Search and Filter Section -->
                <section class="search-filter-section">
                    <div class="search-filter-container">
                        <div class="search-bar">
                            <i class="bi bi-search"></i>
                            <input type="text" placeholder="Search entries..." class="search-input">
                            <div class="filter-dropdown">
                                <button class="filter-btn" id="filterBtn">
                                    <i class="bi bi-funnel"></i>
                                    <span class="filter-text">Filter</span>
                                </button>
                                <div class="filter-menu" id="filterMenu">
                                    <div class="filter-section">
                                        <h4 class="filter-section-title">Emotion</h4>
                                        <div class="filter-options">
                                            <label class="filter-option">
                                                <input type="checkbox" value="happy">
                                                <span class="checkmark"></span>
                                                <span class="filter-label">Happy</span>
                                            </label>
                                            <label class="filter-option">
                                                <input type="checkbox" value="sad">
                                                <span class="checkmark"></span>
                                                <span class="filter-label">Sad</span>
                                            </label>
                                            <label class="filter-option">
                                                <input type="checkbox" value="angry">
                                                <span class="checkmark"></span>
                                                <span class="filter-label">Angry</span>
                                            </label>
                                            <label class="filter-option">
                                                <input type="checkbox" value="anxious">
                                                <span class="checkmark"></span>
                                                <span class="filter-label">Anxious</span>
                                            </label>
                                            <label class="filter-option">
                                                <input type="checkbox" value="calm">
                                                <span class="checkmark"></span>
                                                <span class="filter-label">Calm</span>
                                            </label>
                                        </div>
                                    </div>
                                    <div class="filter-section">
                                        <h4 class="filter-section-title">Tags</h4>
                                        <div class="filter-options">
                                            <label class="filter-option">
                                                <input type="checkbox" value="work">
                                                <span class="checkmark"></span>
                                                <span class="filter-label">Work</span>
                                            </label>
                                            <label class="filter-option">
                                                <input type="checkbox" value="personal">
                                                <span class="checkmark"></span>
                                                <span class="filter-label">Personal</span>
                                            </label>
                                            <label class="filter-option">
                                                <input type="checkbox" value="health">
                                                <span class="checkmark"></span>
                                                <span class="filter-label">Health</span>
                                            </label>
                                            <label class="filter-option">
                                                <input type="checkbox" value="relationships">
                                                <span class="checkmark"></span>
                                                <span class="filter-label">Relationships</span>
                                            </label>
                                            <label class="filter-option">
                                                <input type="checkbox" value="goals">
                                                <span class="checkmark"></span>
                                                <span class="filter-label">Goals</span>
                                            </label>
                                        </div>
                                    </div>
                                    <div class="filter-actions">
                                        <button class="btn-clear" id="clearFilters">Clear</button>
                                        <button class="btn-apply" id="applyFilters">Apply</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Shown when search/filters return no matches (.entries-content--empty-results); copy differs by viewport in CSS -->
                <div class="entries-empty-state" id="entriesEmptyState" aria-live="polite">
                    <i class="bi bi-search entries-empty-state__icon" aria-hidden="true"></i>
                    <p class="entries-empty-state__title entries-empty-state__title--desktop">No entries match your search or filters</p>
                    <p class="entries-empty-state__hint entries-empty-state__hint--desktop">Try different keywords, clear the search box, or adjust filters to see your journal entries.</p>
                    <p class="entries-empty-state__title entries-empty-state__title--mobile">No matches</p>
                    <p class="entries-empty-state__hint entries-empty-state__hint--mobile">Try other words or clear the search bar.</p>
                </div>

                <!-- Entries: one month at a time + dropdown + pagination (filled by entries.js) -->
                <section class="entries-section entries-section--main" id="entriesMainSection" style="display: none;">
                    <div class="entries-toolbar">
                        <label class="visually-hidden" for="entriesMonthSelect">Month and year</label>
                        <select id="entriesMonthSelect" class="entries-month-select" aria-label="Show entries for month"></select>
                    </div>
                    <div class="month-header entries-month-header" id="entriesMonthHeader">
                        <i class="bi bi-calendar3" aria-hidden="true"></i>
                        <span class="month-text" id="entriesMonthHeaderText">—</span>
                    </div>
                    <div class="entries-grid entries-grid--paged" id="entriesGrid"></div>
                    <nav class="entries-pagination" id="entriesPagination" aria-label="Journal entries pages" hidden>
                        <button type="button" class="entries-page-btn" id="entriesPagePrev" aria-label="Previous page">‹ Previous</button>
                        <span class="entries-page-indicator" id="entriesPageIndicator">Page 1 of 1</span>
                        <button type="button" class="entries-page-btn" id="entriesPageNext" aria-label="Next page">Next ›</button>
                    </nav>
                </section>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="side-bar.js"></script>
    <script src="entries.js"></script>
</body>
</html>
