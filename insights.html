<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insights - DiariCore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="side-bar.css" rel="stylesheet">
    <link href="insights.css" rel="stylesheet">
</head>
<body>
    <div class="insights-container">
        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Main Content -->
            <main class="insights-content">
                <!-- Weekly Mood Chart -->
                <section class="weekly-mood-section">
                    <div class="section-header">
                        <h2 class="section-title">Weekly Mood Chart</h2>
                    </div>
                    <div class="chart-container">
                        <canvas id="weeklyMoodChart"></canvas>
                    </div>
                </section>

                <!-- Charts Section -->
                <section class="charts-section">
                    <div class="charts-grid">
                        <!-- Emotion Breakdown -->
                        <div class="chart-card">
                            <div class="section-header">
                                <h2 class="section-title">Emotion Breakdown</h2>
                            </div>
                            <div class="chart-container">
                                <canvas id="emotionPieChart"></canvas>
                            </div>
                        </div>

                        <!-- Activity Impact on Mood -->
                        <div class="chart-card">
                            <div class="section-header">
                                <h2 class="section-title">Activity Impact on Mood</h2>
                            </div>
                            <div class="chart-container">
                                <canvas id="activityImpactChart"></canvas>
                            </div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="side-bar.js"></script>
    <script src="insights.js"></script>
</body>
</html>
