<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Entry - DiariCore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="side-bar.css" rel="stylesheet">
    <link href="dashboard.css" rel="stylesheet">
    <link href="voice-entry.css" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <!-- Include Sidebar -->
        <div include-html="side-bar.html"></div>
        
        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Mobile Header Section -->
            <div class="mobile-header">
                <button class="back-btn" onclick="window.location.href='dashboard.html'">
                    <i class="bi bi-arrow-left"></i>
                </button>
                <h1 class="mobile-title">Voice Entry</h1>
                <button class="save-btn" id="saveEntryBtn">
                    <i class="bi bi-check"></i>
                    Save
                </button>
            </div>
            
            <!-- Voice Entry Content -->
            <div class="voice-content">
                <div class="voice-container">
                    <div class="voice-circle" id="voiceCircle">
                        <i class="bi bi-mic" id="micIcon"></i>
                    </div>
                    
                    <div class="voice-status">
                        <h2 id="statusText">Tap to start recording</h2>
                        <p id="instructionText">Click the microphone button to begin voice recording</p>
                    </div>
                    
                    <div class="voice-timer" id="voiceTimer">00:00</div>
                    
                    <div class="voice-transcript" id="voiceTranscript">
                        <h3>Transcript</h3>
                        <p id="transcriptText">Your speech will appear here as you speak...</p>
                    </div>
                    
                    <div class="voice-actions">
                        <button class="voice-btn secondary" id="clearBtn" disabled>
                            <i class="bi bi-trash"></i>
                            <span>Clear</span>
                        </button>
                        <button class="voice-btn primary" id="saveBtn" disabled>
                            <i class="bi bi-save"></i>
                            <span>Save Entry</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="side-bar.js"></script>
    <script src="voice-entry.js"></script>
</body>
</html>
